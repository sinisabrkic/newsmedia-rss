<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="index,follow">
  <title>newsmedia.report RSS Feed</title>
  <meta name="description" content="Official RSS feed of newsmedia.report.">
  <link rel="alternate" type="application/rss+xml" title="newsmedia.report RSS Feed" href="/rss.xml">
  <style>
    :root { color-scheme: light dark; font-family: Arial, Helvetica, sans-serif; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #111; color: #f5f5f5; }
    main { width: min(720px, calc(100% - 40px)); padding: 48px 0; }
    h1 { font-size: clamp(2rem, 7vw, 4.4rem); line-height: 1; margin: 0 0 24px; }
    p { font-size: 1.08rem; line-height: 1.7; color: #d4d4d4; }
    a { color: #fff; text-underline-offset: 4px; }
    .button { display: inline-block; margin-top: 18px; padding: 14px 20px; border: 1px solid #fff; text-decoration: none; font-weight: 700; }
    .small { margin-top: 36px; font-size: .9rem; color: #999; }
  </style>
</head>
<body>
  <main>
    <h1>newsmedia.report RSS</h1>
    <p>This is the official RSS feed for news, special reports and analysis published by newsmedia.report.</p>
    <a class="button" href="/rss.xml">Open RSS feed</a>
    <p class="small"><a href="https://www.newsmedia.report/">Return to newsmedia.report</a></p>
  </main>
</body>
</html>
