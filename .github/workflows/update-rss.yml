name: Update RSS Feed

on:
  workflow_dispatch:
  schedule:
    # Every 10 minutes, offset from the top of the hour.
    - cron: "7,17,27,37,47,57 * * * *"

permissions:
  contents: write

concurrency:
  group: newsmedia-rss-update
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/checkout@v7
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Generate and validate RSS feed
        run: python generate_feed.py

      - name: Commit feed changes
        run: |
          if git diff --quiet -- rss.xml feed_state.json; then
            echo "No new or changed articles. Nothing to commit."
            exit 0
          fi
          git config user.name "newsmedia-rss-bot"
          git config user.email "actions@users.noreply.github.com"
          git add rss.xml feed_state.json
          git commit -m "Update RSS feed"
          git push
